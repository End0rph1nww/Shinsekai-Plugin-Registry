name: Validate Plugin Registry

on:
  pull_request:
    paths:
      - "plugins.json"
      - "scripts/registry/**"
      - "tests/**"
      - ".github/workflows/validate-registry.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pytest

      - name: Run tests
        run: python -m pytest tests -q

      - name: Validate registry
        run: python scripts/registry/validate_plugins.py plugins.json
