name: Publish Plugin
description: Submit a Shinsekai plugin to the registry
title: "[Plugin] YOUR PLUGIN NAME"
labels: ["plugin-publish"]
body:
  - type: markdown
    attributes:
      value: |
        Paste the JSON generated by the Shinsekai plugin market or local submit helper.
  - type: textarea
    id: plugin-info
    attributes:
      label: Plugin Info
      description: Keep the fenced JSON block intact so the registry workflow can parse it.
      value: |
        ```json
        {
          "display_name": "Human-readable plugin name",
          "desc": "Short description, 200 characters or fewer",
          "author": "author",
          "repo": "https://github.com/owner/repo",
          "shinsekai_version": ">=0.2.0",
          "tags": [],
          "social_link": ""
        }
        ```
    validations:
      required: true
